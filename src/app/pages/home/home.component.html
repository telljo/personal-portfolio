<section class="home-hero">
  <div class="u-container home-hero__grid">
    <div class="home-hero__content">
      <div class="home-hero__eyebrow">
        <span class="home-hero__eyebrow-line"></span>
        <span>Senior Full Stack Engineer</span>
      </div>

      <h1 class="home-hero__title">
        <span class="home-hero__title-line">Josh</span>
        <span class="home-hero__title-line home-hero__title-line--accent">Tell</span>
      </h1>

      <p class="home-hero__summary">
        I build scalable web products that feel simple to use and solid under the hood. Clean code, thoughtful design.
      </p>

      <div class="home-hero__actions">
        <a class="button button--primary" routerLink="/experience">
          Career Highlights
          <span aria-hidden="true">↗</span>
        </a>
        <a class="button button--ghost" routerLink="/projects">View My Work</a>
      </div>
    </div>

    <div class="home-hero__visual">
      <div class="home-hero__portrait-frame">
        <div class="home-hero__portrait-shell">
          <img
            alt="Portrait of Josh Tell"
            class="home-hero__portrait"
            src="assets/Images/new-profile-960.webp"
            srcset="assets/Images/new-profile-480.webp 480w, assets/Images/new-profile-960.webp 960w"
            sizes="(min-width: 64rem) 28rem, (min-width: 48rem) 70vw, calc(100vw - 2rem)"
            width="960"
            height="1280"
            loading="eager"
            fetchpriority="high"
            decoding="async"
          >
        </div>
      </div>
    </div>
  </div>
</section>

@defer (on idle; prefetch on viewport) {
  <app-home-highlights />
} @placeholder {
  <section class="home-highlights-placeholder" aria-hidden="true">
    <div class="u-container home-highlights-placeholder__grid">
      <div class="home-highlights-placeholder__card"></div>
      <div class="home-highlights-placeholder__card"></div>
      <div class="home-highlights-placeholder__card"></div>
    </div>
  </section>
}
